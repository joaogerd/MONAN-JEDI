# =============================================================================
# MONAN-JEDI site configuration for JACI
# =============================================================================
#
# This file is the user-editable configuration entry point for compiling and
# testing the MONAN-JEDI bundle with an existing spack-stack installation.
# The shell scripts should not be edited for normal use.
#
# Important concept
# -----------------
# This build/test setup has three independent filesystem areas:
#
#   1. project.root
#      User-owned workspace root.
#
#   2. stack.root or stack.owner + stack.instance
#      Location of an existing spack-stack installation. This stack may be owned
#      by another user and may be read-only for normal MONAN-JEDI users.
#
#   3. install.root
#      User-owned publication area for executables produced by this workflow.
#      Final executables are collected under install.bin_dir.
#
# Do not assume that the stack is under project.root.
# A user may work in their own directory while consuming a stack maintained by
# another account.
# =============================================================================

site: jaci

project:
  # User-owned MONAN-JEDI workspace root.
  # Build trees are created under: ${project.root}/work
  # Logs are created under:        ${project.root}/logs
  # Executables are published under install.bin_dir.
  root: /p/projetos/monan_das/${USER}

stack:
  # Unix account that owns the validated spack-stack tree.
  # If the current user owns the stack, this may be ${USER}.
  # If a shared stack maintained by another account is used, set that owner here.
  owner: joao.gerd

  # Stack instance identifier produced by spack-stack-inpe.
  # Used only to derive stack.work_root and stack.root when those are not set.
  instance: spack-stack-inpe-overlay-20260515T181917Z

  # Optional explicit stack work root.
  # If empty or omitted, the scripts derive:
  #   /p/projetos/monan_das/${stack.owner}/work/${stack.instance}
  work_root:

  # Optional explicit spack-stack root.
  # If empty or omitted, the scripts derive:
  #   ${stack.work_root}/spack-stack
  root:

  # Name of the generated spack-stack environment.
  env_name: jaci-mpas-jedi-gcc12-craympich

  # Optional explicit module root.
  # If empty or omitted, the scripts derive:
  #   ${stack.root}/envs/${stack.env_name}/modules
  module_root:

  # JACI site setup script inside the spack-stack tree.
  # This is the site setup, not the root spack-stack setup.sh.
  # Normal users should not source ${stack.root}/setup.sh.
  site_setup: configs/sites/tier2/jaci/setup.sh

  # Generated environment module to load after module use ${stack.module_root}.
  env_module: cray-mpich/8.1.31/none/none/jedi-mpas-env/1.0.0

build:
  # Identifier for this compilation/test attempt.
  # Change this when you want a new independent build/log/install tree.
  id: monan-jedi-mpas-only

  # Main MONAN-JEDI bundle build tree.
  # Empty means: ${project.root}/work/${build.id}/build
  dir:

  # Number of parallel build jobs passed to make.
  jobs: 8

install:
  # Publication root for executables produced by this workflow.
  # Empty means: ${project.root}/install/${build.id}
  root:

  # Common executable directory for the MONAN-JEDI bundle and auxiliary tools.
  # Empty means: ${install.root}/bin
  bin_dir:

model:
  # MONAN/MPAS precision mode passed to ecbuild/CMake as MPAS_DOUBLE_PRECISION.
  # Keep this value quoted because YAML may interpret unquoted ON/OFF as booleans.
  double_precision: 'ON'

obs2ioda:
  # Build NCAR/obs2ioda as an auxiliary executable using the same stack
  # environment used by MONAN-JEDI. It is downloaded and compiled outside the
  # main MPAS-JEDI bundle build tree, but the final executable is published in
  # the same install.bin_dir used by the bundle executables.
  enabled: true

  repo: https://github.com/NCAR/obs2ioda.git
  ref: main

  # Source checkout and CMake build tree for obs2ioda.
  # Empty means:
  #   source_dir: ${project.root}/work/obs2ioda/src
  #   build_dir:  ${project.root}/work/obs2ioda/build
  source_dir:
  build_dir:

  # Optional install root for obs2ioda. Empty means install.root.
  # The published executable is copied to install.bin_dir/executable_name.
  install_dir:
  executable_name: obs2ioda.x

  # JACI/spack-stack-inpe currently provides NOAA BUFR as libbufr_4.so, not as
  # libbufr.so or libbufr.a. Leave this empty to auto-detect it from the loaded
  # stack. Set it explicitly if the automatic search finds the wrong library.
  bufr_root:
  bufr_lib:

  # Extra CMake prefixes, separated by semicolon if needed. NetCDF C, Fortran and
  # CXX prefixes are detected automatically through nc-config, nf-config and
  # ncxx4-config.
  cmake_prefix_path:

  build_type: Release
  build_goes_abi_converter: 'OFF'
  
compilers:
  # Compiler commands or absolute paths used by CMake/ecbuild.
  # On JACI CrayPE these should normally remain as cc, CC and ftn.
  cc: cc
  cxx: CC
  fc: ftn
  f77: ftn
  f90: ftn

mpi:
  # MPI compiler commands or absolute paths.
  # On CrayPE, the compiler wrappers cc, CC and ftn are also the MPI wrappers.
  mpicc: cc
  mpicxx: CC
  mpifc: ftn
  mpif77: ftn
  mpif90: ftn

ctest:
  # Login-node-safe CTest subset.
  login_regex: "^mpasjedi_coding_norms$"

  # Full PBS/compute-node CTest run.
  # Empty means: do not restrict with -R.
  pbs_regex: ""

  # Known failing tests excluded from the full suite.
  exclude_regex: "^(ioda_bufr_python_encoder|ioda_bufr_python_parallel|mpasjedi_lgetkf_height_vloc)$"

  # Number of parallel CTest jobs.
  jobs: 1

  # Keep false unless you explicitly know the selected tests do not require PBS.
  allow_login_node_mpi_tests: false

pbs:
  # PBS settings for compute-node tests.
  queue: pesqmini
  ncpus: 64
  walltime: "00:30:00"

  # If false, the PBS script is generated but not submitted.
  submit_job: true
