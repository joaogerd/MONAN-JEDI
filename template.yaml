site: site-name

project:
  root: /path/to/project/root

stack:
  instance: stack-instance-name
  env_name: stack-environment-name
  env_module: module/name

workflow:
  run_id: monan-jedi-run

compilers:
  cc: cc
  cxx: CC
  fc: ftn
  f77: ftn
  f90: ftn

mpi:
  mpicc: cc
  mpicxx: CC
  mpifc: ftn
  mpif77: ftn
  mpif90: ftn

jedi_bundle:
  repo: https://github.com/JCSDA/jedi-bundle.git
  ref: develop

build:
  jobs: 8

ctest:
  login_regex: "^mpasjedi_coding_norms$"
  pbs_regex: "^mpasjedi_geometry$"
  exclude_regex: ""
  jobs: 1
  allow_login_node_mpi_tests: false

pbs:
  queue: queue-name
  ncpus: 64
  walltime: "00:30:00"
  submit_job: true
